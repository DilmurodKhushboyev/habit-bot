<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Super Habits</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #E0E3EA;
  --bg2:       #D6D9E0;
  --surface:   #E8EBF2;
  --raised:    #ECEEF5;
  --text:      #3A3D4A;
  --sub:       #8A8D9A;
  --accent:    #E07040;
  --accent2:   #5B8DEF;
  --green:     #4CAF7D;
  --red:       #E05050;
  --gold:      #D4963A;

  /* Neumorphism shadows */
  --sh-out:    6px 6px 14px #B8BBCA, -6px -6px 14px #FFFFFF;
  --sh-in:     inset 4px 4px 10px #B8BBCA, inset -4px -4px 10px #FFFFFF;
  --sh-sm:     3px 3px 8px #B8BBCA, -3px -3px 8px #FFFFFF;
  --sh-press:  inset 2px 2px 6px #B8BBCA, inset -2px -2px 6px #FFFFFF;
  --sh-card:   8px 8px 20px #B0B3C2, -8px -8px 20px #FFFFFF;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── HEADER ── */
.header {
  background: var(--bg);
  padding: 20px 20px 0;
  position: sticky; top: 0; z-index: 10;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.logo-wrap {
  display: flex; align-items: center; gap: 12px;
}
.logo-icon {
  width: 42px; height: 42px; border-radius: 14px;
  background: var(--bg);
  box-shadow: var(--sh-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.header-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.header-sub { font-size: 11px; color: var(--sub); font-weight: 400; }

.pts-chip {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  padding: 8px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600; color: var(--gold);
  display: flex; align-items: center; gap: 5px;
}

/* ── TABS ── */
.tabs-wrap {
  background: var(--bg);
  padding: 0 20px 16px;
  position: sticky; top: 62px; z-index: 9;
}
.tabs {
  display: flex; gap: 8px;
  background: var(--bg);
  box-shadow: var(--sh-in);
  border-radius: 18px;
  padding: 5px;
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 9px 16px; border-radius: 14px;
  font-size: 12px; font-weight: 600;
  color: var(--sub); cursor: pointer; border: none;
  background: transparent;
  transition: all .25s ease;
  white-space: nowrap;
}
.tab.active {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  color: var(--text);
}

/* ── PAGES ── */
.page { display: none; padding: 0 20px; }
.page.active { display: block; }

/* ── SECTION TITLE ── */
.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: var(--sub); text-transform: uppercase;
  margin: 20px 0 12px 2px;
}

/* ── NEU CARD ── */
.neu-card {
  background: var(--bg);
  box-shadow: var(--sh-card);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 12px;
}

/* ── LOADING ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px; gap: 16px; color: var(--sub);
  font-size: 13px;
}
.spinner {
  width: 32px; height: 32px; border-radius: 50%;
  box-shadow: var(--sh-in);
  border: 3px solid transparent;
  border-top-color: var(--accent);
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center; padding: 50px 20px;
  color: var(--sub); font-size: 13px;
}
.empty-state .icon { font-size: 36px; margin-bottom: 12px; }

/* ── REYTING ── */
.legend {
  display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap;
}
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--sub); }
.leg-dot  { width: 8px; height: 8px; border-radius: 50%; }
.leg-green { background: var(--green); }
.leg-red   { background: var(--red); }
.leg-empty { border: 1.5px solid var(--sub); }

.grid-header {
  display: flex; align-items: center;
  padding: 0 14px 8px; gap: 8px;
}
.gh-name { flex: 1; font-size: 10px; color: var(--sub); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.gh-days { display: flex; gap: 3px; }
.gh-day  { width: 18px; text-align: center; font-size: 9px; color: var(--sub); font-weight: 500; font-family: 'DM Mono', monospace; }

.user-row {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  border-radius: 16px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.user-row.rank-1 { box-shadow: 6px 6px 14px #B8BBCA, -6px -6px 14px #FFFFFF, inset 0 0 0 1.5px #D4963A44; }
.user-row.rank-2 { box-shadow: 6px 6px 14px #B8BBCA, -6px -6px 14px #FFFFFF, inset 0 0 0 1.5px #9AA0B044; }
.user-row.rank-3 { box-shadow: 6px 6px 14px #B8BBCA, -6px -6px 14px #FFFFFF, inset 0 0 0 1.5px #C08A4044; }

.rank-badge { font-size: 18px; width: 24px; text-align: center; }
.user-info  { flex: 1; min-width: 0; }
.user-name  { font-size: 13px; font-weight: 600; color: var(--text); }
.user-pts   { font-size: 11px; color: var(--sub); margin-top: 1px; }
.day-dots   { display: flex; gap: 3px; }
.dot {
  width: 18px; height: 18px; border-radius: 6px;
  box-shadow: var(--sh-in);
}
.dot.done  { background: var(--green); box-shadow: 2px 2px 5px #3DA86840, -2px -2px 5px #FFFFFF; }
.dot.miss  { background: var(--red);   box-shadow: 2px 2px 5px #E0505040, -2px -2px 5px #FFFFFF; }
.dot.empty { background: var(--bg); }

/* ── PROFIL ── */
.profile-card {
  background: var(--bg);
  box-shadow: var(--sh-card);
  border-radius: 24px;
  padding: 24px;
  margin-bottom: 12px;
}
.profile-top {
  display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
}
.avatar {
  width: 60px; height: 60px; border-radius: 20px;
  background: var(--bg);
  box-shadow: var(--sh-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: var(--accent);
}
.profile-name { font-size: 18px; font-weight: 700; color: var(--text); }
.profile-rank { font-size: 12px; color: var(--sub); margin-top: 3px; }

.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-bottom: 20px;
}
.stat-box {
  background: var(--bg);
  box-shadow: var(--sh-in);
  border-radius: 16px;
  padding: 14px 10px; text-align: center;
}
.stat-val { font-size: 22px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.jon-bar-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--sub); margin-bottom: 8px; }
.jon-bar-bg  {
  height: 8px; border-radius: 10px;
  box-shadow: var(--sh-in);
  overflow: hidden;
}
.jon-bar-fill { height: 100%; border-radius: 10px; transition: width .6s ease; }

.habits-list { display: flex; flex-direction: column; gap: 8px; }
.habit-item {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.habit-icon   { font-size: 20px; }
.habit-name   { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.habit-streak { font-size: 12px; color: var(--sub); }

/* ── ODATLAR ── */
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px; border-radius: 16px;
  background: var(--bg);
  box-shadow: var(--sh-sm);
  border: none; color: var(--accent2);
  font-size: 14px; font-weight: 600; cursor: pointer;
  margin-bottom: 16px; font-family: inherit;
  transition: box-shadow .15s, transform .15s;
}
.add-btn:active { box-shadow: var(--sh-press); transform: scale(0.98); }

.habit-card {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  border-radius: 16px;
  margin-bottom: 8px;
}
.habit-card-top {
  display: flex; align-items: center; gap: 10px; padding: 14px;
}
.habit-card-icon { font-size: 22px; flex-shrink: 0; }
.habit-card-info { flex: 1; min-width: 0; }
.habit-card-name { font-size: 14px; font-weight: 600; color: var(--text); }
.habit-card-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
.habit-card-actions { display: flex; gap: 8px; }
.hbtn {
  width: 34px; height: 34px; border-radius: 10px;
  border: none; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  box-shadow: var(--sh-sm);
  color: var(--sub);
  transition: box-shadow .15s, transform .15s;
  font-family: inherit;
}
.hbtn:active { box-shadow: var(--sh-press); transform: scale(0.92); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(210,213,220,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg);
  box-shadow: 0 -10px 40px rgba(0,0,0,0.12);
  border-radius: 28px 28px 0 0;
  padding: 24px 20px 40px; width: 100%;
  animation: slideUp .28s cubic-bezier(.32,1.2,.5,1);
  position: relative;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--sub); opacity: 0.3;
  margin: 0 auto 20px;
}
.modal-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 20px; color: var(--text); }
.modal-close {
  position: absolute; right: 20px; top: 20px;
  background: var(--bg); box-shadow: var(--sh-sm);
  border: none; color: var(--sub);
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.field { margin-bottom: 14px; }
.field label {
  font-size: 11px; color: var(--sub); font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  display: block; margin-bottom: 8px;
}
.field input {
  width: 100%; padding: 14px 16px; border-radius: 14px;
  background: var(--bg);
  box-shadow: var(--sh-in);
  border: none; color: var(--text); font-size: 14px;
  font-family: inherit; outline: none;
}
.field input::placeholder { color: var(--sub); }

.icon-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-top: 6px;
}
.icon-opt {
  aspect-ratio: 1; border-radius: 10px;
  background: var(--bg); box-shadow: var(--sh-sm);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
}
.icon-opt.selected { box-shadow: var(--sh-press); background: var(--bg2); }

.save-btn {
  width: 100%; padding: 16px; border-radius: 16px;
  background: var(--bg);
  box-shadow: var(--sh-sm);
  border: none; color: var(--text); font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer; margin-top: 8px;
  transition: box-shadow .15s, transform .15s;
}
.save-btn:active { box-shadow: var(--sh-press); transform: scale(0.98); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 12px 22px; border-radius: 24px;
  font-size: 13px; font-weight: 600; z-index: 200; opacity: 0;
  transition: opacity .3s; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
  white-space: nowrap;
}
.toast.show { opacity: 1; }
.toast.err  { background: var(--red); color: #fff; }

/* ── BUGUN (CHECK-IN) ── */
.today-hero {
  background: var(--bg);
  box-shadow: var(--sh-card);
  border-radius: 24px;
  padding: 22px;
  margin-bottom: 8px;
  text-align: center;
}
.today-date { font-size: 11px; color: var(--sub); letter-spacing: 1.5px; text-transform: uppercase; }
.today-prog {
  font-size: 52px; font-weight: 700; color: var(--text);
  letter-spacing: -2px; margin: 8px 0 2px;
  font-family: 'DM Mono', monospace;
}
.today-sub { font-size: 13px; color: var(--sub); }
.prog-ring-wrap { display: flex; justify-content: center; margin: 16px 0 4px; }
.prog-ring-wrap svg { filter: drop-shadow(3px 3px 8px #B8BBCA) drop-shadow(-2px -2px 6px #FFFFFF); }

.all-done-banner {
  background: var(--bg);
  box-shadow: var(--sh-card);
  border-radius: 20px;
  padding: 20px; text-align: center; margin-bottom: 12px;
  display: none;
}
.all-done-banner.show { display: block; animation: fadeIn .4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.all-done-banner .bd-icon  { font-size: 32px; }
.all-done-banner .bd-title { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 8px; }
.all-done-banner .bd-sub   { font-size: 12px; color: var(--sub); margin-top: 4px; }

.checkin-card {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  border-radius: 18px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 14px;
  padding: 16px;
  cursor: pointer;
  transition: box-shadow .2s;
  position: relative; overflow: hidden;
}
.checkin-card.done {
  box-shadow: var(--sh-in);
}
.checkin-icon { font-size: 24px; flex-shrink: 0; }
.checkin-info { flex: 1; min-width: 0; }
.checkin-name {
  font-size: 14px; font-weight: 600; color: var(--text);
  transition: color .2s;
}
.checkin-card.done .checkin-name { color: var(--green); }
.checkin-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }

.checkin-btn {
  width: 42px; height: 42px; border-radius: 50%;
  border: none; cursor: pointer; flex-shrink: 0;
  background: var(--bg);
  box-shadow: var(--sh-sm);
  font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; color: var(--sub);
}
.checkin-card.done .checkin-btn {
  box-shadow: var(--sh-press);
  background: var(--green); color: #fff; font-size: 18px;
}
.checkin-btn:active { transform: scale(0.88); }

.confetti-pop {
  position: absolute; inset: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; opacity: 0;
}
.confetti-pop.show { animation: popAnim .55s ease forwards; }
@keyframes popAnim {
  0%   { opacity: 1; transform: scale(.4); }
  50%  { opacity: 1; transform: scale(1.4); }
  100% { opacity: 0; transform: scale(1.8); }
}

/* ── GURUHLAR ── */
.group-card {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  border-radius: 18px;
  padding: 16px; margin-bottom: 10px;
}
.group-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.group-meta { font-size: 11px; color: var(--sub); margin-bottom: 12px; }
.group-members { display: flex; flex-direction: column; gap: 6px; }
.member-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 12px;
  background: var(--bg); box-shadow: var(--sh-in);
}
.member-name { font-size: 12px; font-weight: 500; color: var(--text); }
.member-pts  { font-size: 11px; color: var(--sub); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg);
  padding: 12px 16px 20px;
  display: flex; justify-content: space-around; align-items: center;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  z-index: 20;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; padding: 8px 14px; border-radius: 16px;
  transition: all .2s; border: none; background: transparent;
  font-family: inherit;
  color: var(--sub);
}
.nav-item.active {
  background: var(--bg);
  box-shadow: var(--sh-sm);
  color: var(--text);
}
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo-icon">🌱</div>
      <div>
        <div class="header-title">Super Habits</div>
        <div class="header-sub">@Super_habits_bot</div>
      </div>
    </div>
    <div class="pts-chip" id="header-pts">⭐ —</div>
  </div>
</div>

<!-- PAGES -->
<div class="tabs-wrap" style="display:none" id="tabs-wrap">
  <div class="tabs" id="tabs-inner"></div>
</div>

<!-- BUGUN -->
<div class="page active" id="page-today">
  <div id="today-content">
    <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
  </div>
</div>

<!-- REYTING -->
<div class="page" id="page-rating">
  <div id="rating-content">
    <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
  </div>
</div>

<!-- PROFIL -->
<div class="page" id="page-profile">
  <div id="profile-content">
    <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
  </div>
</div>

<!-- ODATLAR -->
<div class="page" id="page-habits">
  <div id="habits-content">
    <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
  </div>
</div>

<!-- GURUHLAR -->
<div class="page" id="page-groups">
  <div id="groups-content">
    <div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-today" onclick="switchTab('today', this)">
    <span class="nav-icon">☀️</span>
    <span class="nav-label">Bugun</span>
  </button>
  <button class="nav-item" id="nav-rating" onclick="switchTab('rating', this)">
    <span class="nav-icon">🏆</span>
    <span class="nav-label">Reyting</span>
  </button>
  <button class="nav-item" id="nav-profile" onclick="switchTab('profile', this)">
    <span class="nav-icon">👤</span>
    <span class="nav-label">Profil</span>
  </button>
  <button class="nav-item" id="nav-habits" onclick="switchTab('habits', this)">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Odatlar</span>
  </button>
  <button class="nav-item" id="nav-groups" onclick="switchTab('groups', this)">
    <span class="nav-icon">👥</span>
    <span class="nav-label">Guruhlar</span>
  </button>
</nav>

<script>
// ── TELEGRAM WEB APP ──
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const user     = tg?.initDataUnsafe?.user || { id: 0, first_name: 'Test' };
const initData = tg?.initData || '';
const userId   = user.id || 0;
const API      = window.location.origin + '/api';

// ── STATE ──
let loaded = { today: false, rating: false, profile: false, habits: false, groups: false };
let data   = {};

// ── TAB SWITCH ──
function switchTab(tab, el) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (!loaded[tab]) loadTab(tab);
}

async function loadTab(tab) {
  if (tab === 'today')   await loadToday();
  if (tab === 'rating')  await loadRating();
  if (tab === 'profile') await loadProfile();
  if (tab === 'habits')  await loadHabits();
  if (tab === 'groups')  await loadGroups();
  loaded[tab] = true;
}

// ── FETCH ──
async function apiFetch(endpoint) {
  const res = await fetch(`${API}/${endpoint}`, {
    headers: { 'X-Init-Data': initData, 'X-User-Id': userId }
  });
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

// ── PROGRESS RING SVG ──
function ringHTML(percent, size = 80) {
  const r = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  const dash = circ * percent / 100;
  const color = percent >= 100 ? '#4CAF7D' : percent >= 50 ? '#5B8DEF' : '#E07040';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#C8CBD8" stroke-width="6"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
      stroke-linecap="round" style="transition:stroke-dasharray .6s ease"/>
    <text x="${size/2}" y="${size/2 + 6}" text-anchor="middle"
      font-family="DM Mono,monospace" font-size="18" font-weight="600" fill="#3A3D4A">${percent}%</text>
  </svg>`;
}

// ── BUGUN ──
async function loadToday() {
  try {
    const d = await apiFetch(`today/${userId}`);
    data.today = d;
    renderToday(d);
    // Header points
    try {
      const p = await apiFetch(`profile/${userId}`);
      document.getElementById('header-pts').textContent = '⭐ ' + (p.points || 0);
    } catch(e) {}
  } catch(e) {
    document.getElementById('today-content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>Ma'lumot yuklanmadi.<br><small>${e}</small></div>`;
  }
}

function renderToday(d) {
  const { habits, done_count, total, percent, today } = d;
  const dt = new Date(today);
  const dayNames = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
  const months   = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  const dateStr  = `${dt.getDate()} ${months[dt.getMonth()]} — ${dayNames[dt.getDay()]}`;
  const allDone  = done_count === total && total > 0;

  let cardsHtml = '';
  (habits || []).forEach(h => {
    cardsHtml += `
      <div class="checkin-card ${h.done ? 'done' : ''}" id="ccard-${h.id}" onclick="checkin('${h.id}', this)">
        <div class="checkin-icon">${h.icon || '✅'}</div>
        <div class="checkin-info">
          <div class="checkin-name">${h.name}</div>
          <div class="checkin-meta">${h.time !== 'vaqtsiz' ? '⏰ ' + h.time + ' · ' : ''}🔥 ${h.streak} kun</div>
        </div>
        <button class="checkin-btn" id="cbtn-${h.id}">${h.done ? '✓' : ''}</button>
        <div class="confetti-pop" id="pop-${h.id}">✨</div>
      </div>`;
  });

  document.getElementById('today-content').innerHTML = `
    <div class="all-done-banner ${allDone ? 'show' : ''}" id="all-done-banner">
      <div class="bd-icon">🎉</div>
      <div class="bd-title">Barchasi bajarildi!</div>
      <div class="bd-sub">Ajoyib! Streak davom etmoqda 🔥</div>
    </div>

    <div class="today-hero">
      <div class="today-date">${dateStr}</div>
      <div class="prog-ring-wrap" id="prog-ring">${ringHTML(percent)}</div>
      <div class="today-sub" id="prog-sub">${done_count} / ${total} odat bajarildi</div>
    </div>

    <div class="section-title">Bugungi odatlar</div>
    ${cardsHtml || '<div class="empty-state"><div class="icon">📋</div>Hali odat qo\'shilmagan</div>'}
    <div class="toast" id="toast-today"></div>`;
}

async function checkin(hid, cardEl) {
  const btn = document.getElementById('cbtn-' + hid);
  const pop = document.getElementById('pop-' + hid);
  if (btn) btn.disabled = true;
  try {
    const res = await fetch(`${API}/checkin/${userId}/${hid}`, {
      method: 'POST',
      headers: { 'X-Init-Data': initData, 'X-User-Id': userId }
    });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error);
    const isDone = result.done;

    cardEl.classList.toggle('done', isDone);
    if (btn) { btn.textContent = isDone ? '✓' : ''; }

    const metaEl = cardEl.querySelector('.checkin-meta');
    if (metaEl) {
      const tp = metaEl.innerHTML.includes('⏰') ? metaEl.innerHTML.split('·')[0] + '· ' : '';
      metaEl.innerHTML = `${tp}🔥 ${result.streak} kun`;
    }

    if (isDone && pop) {
      pop.classList.add('show');
      setTimeout(() => pop.classList.remove('show'), 600);
    }

    // Ring yangilash
    if (data.today) {
      data.today.done_count += isDone ? 1 : -1;
      data.today.done_count = Math.max(0, Math.min(data.today.total, data.today.done_count));
      const pct = data.today.total ? Math.round(data.today.done_count / data.today.total * 100) : 0;
      const ringEl = document.getElementById('prog-ring');
      if (ringEl) ringEl.innerHTML = ringHTML(pct);
      const subEl = document.getElementById('prog-sub');
      if (subEl) subEl.textContent = `${data.today.done_count} / ${data.today.total} odat bajarildi`;
      const habit = (data.today.habits || []).find(h => h.id === hid);
      if (habit) { habit.done = isDone; habit.streak = result.streak; }
    }

    if (result.all_done) {
      const b = document.getElementById('all-done-banner');
      if (b) b.classList.add('show');
    } else {
      const b = document.getElementById('all-done-banner');
      if (b) b.classList.remove('show');
    }

    showTodayToast(isDone ? '✅ ' + result.msg : '↩️ Bekor qilindi');
    loaded.profile = false; loaded.rating = false;
  } catch(e) {
    showTodayToast('❌ Xato: ' + e.message, true);
  } finally {
    if (btn) btn.disabled = false;
  }
}

function showTodayToast(msg, err = false) {
  const t = document.getElementById('toast-today');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ── REYTING ──
async function loadRating() {
  try {
    const d = await apiFetch('rating');
    data.rating = d;
    renderRating(d);
  } catch(e) {
    document.getElementById('rating-content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>Ma'lumot yuklanmadi.<br><small>${e}</small></div>`;
  }
}

function renderRating(d) {
  const { today, days, day_labels: lbls, users } = d;
  const rankColors = ['#D4963A','#9AA0B0','#C08A40'];
  let daysHtml = lbls.map(l => `<div class="gh-day">${l}</div>`).join('');
  let rowsHtml = '';

  users.forEach((u, i) => {
    const rc = rankColors[i] || '#8A8D9A';
    const rankClass = i < 3 ? `rank-${i+1}` : '';
    const medal = ['🥇','🥈','🥉'][i] || (i+1);
    let dots = '';
    days.forEach(dstr => {
      if (dstr > today || dstr < u.bot_start) dots += `<div class="dot empty"></div>`;
      else if (u.done_log && u.done_log[dstr]) dots += `<div class="dot done"></div>`;
      else dots += `<div class="dot miss"></div>`;
    });
    rowsHtml += `
      <div class="user-row ${rankClass}">
        <div class="rank-badge">${medal}</div>
        <div class="user-info">
          <div class="user-name">${u.name}</div>
          <div class="user-pts">${u.points} ball</div>
        </div>
        <div class="day-dots">${dots}</div>
      </div>`;
  });

  const oy = ['','Yan','Fev','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];
  const now = new Date();
  const monthLbl = oy[now.getMonth()+1] + ' ' + now.getFullYear();

  document.getElementById('rating-content').innerHTML = `
    <div class="section-title">Top 10 · ${monthLbl}</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot leg-green"></div>Bajarildi</div>
      <div class="leg-item"><div class="leg-dot leg-red"></div>Bajarilmadi</div>
      <div class="leg-item"><div class="leg-dot leg-empty"></div>Ma'lumot yo'q</div>
    </div>
    <div class="grid-header">
      <div class="gh-name">Foydalanuvchi</div>
      <div class="gh-days">${daysHtml}</div>
    </div>
    ${rowsHtml}`;
}

// ── PROFIL ──
async function loadProfile() {

    const d = await apiFetch(`profile/${userId}`);
    renderProfile(d);
  } catch(e) {
    document.getElementById('profile-content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>Ma'lumot yuklanmadi.</div>`;
  }
}

      <div class="jon-bar-bg">
        <div class="jon-bar-fill" style="width:${jon}%;background:${jonColor}"></div>
      </div>
    </div>
    <div class="section-title">Odatlarim</div>

}

// ── ODATLAR ──
const ICONS = ['✅','📚','🏃','💪','🧘','🍎','💧','😴','✍️','🎯','🎸','🌿','🧹','💊','🙏','🧠','🚴','🏋️','📝','🌅'];
let editingHabitId = null;

async function loadHabits() {
  try {
    const d = await apiFetch(`habits/${userId}`);
    renderHabits(d.habits || []);
  } catch(e) {
    document.getElementById('habits-content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>Ma'lumot yuklanmadi.</div>`;
  }
}

function renderHabits(habits) {
  let rows = '';
  habits.forEach(h => {
    rows += `
      <div class="habit-card" id="hcard-${h.id}">
        <div class="habit-card-top">
          <div class="habit-card-icon">${h.icon||'✅'}</div>
          <div class="habit-card-info">
            <div class="habit-card-name">${h.name}</div>
            <div class="habit-card-meta">⏰ ${h.time||'vaqtsiz'} &nbsp;🔥 ${h.streak} kun</div>
          </div>
          <div class="habit-card-actions">
            <button class="hbtn" onclick="openEdit('${h.id}','${h.name.replace(/'/g,"\\'")}','${h.icon||'✅'}','${h.time||'vaqtsiz'}')">✏️</button>
            <button class="hbtn" onclick="deleteHabit('${h.id}')">🗑️</button>
          </div>
        </div>
      </div>`;
  });

  const iconGrid = ICONS.map(ic =>
    `<div class="icon-opt" data-icon="${ic}" onclick="selectIcon(this)">${ic}</div>`
  ).join('');

  document.getElementById('habits-content').innerHTML = `
    <div>
      <button class="add-btn" onclick="openAdd()">＋ Yangi odat qo'shish</button>
      <div class="section-title">Odatlarim (${habits.length})</div>
      ${rows || '<div class="empty-state"><div class="icon">📋</div>Hozircha odat yo\'q</div>'}
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="habit-modal">
      <div class="modal">
        <div class="modal-handle"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-title" id="modal-title">Yangi odat</div>
        <div class="field">
          <label>Nomi</label>
          <input id="h-name" type="text" placeholder="Masalan: Kitob o'qish" maxlength="60">
        </div>
        <div class="field">
          <label>Vaqt (ixtiyoriy)</label>
          <input id="h-time" type="text" placeholder="Masalan: 07:00 yoki vaqtsiz">
        </div>
        <div class="field">
          <label>Icon tanlang</label>
          <div class="icon-grid">${iconGrid}</div>
        </div>
        <button class="save-btn" onclick="saveHabit()">Saqlash</button>
      </div>
    </div>`;
}

function selectIcon(el) {
  document.querySelectorAll('.icon-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}
function openAdd() {
  editingHabitId = null;
  document.getElementById('modal-title').textContent = 'Yangi odat';
  document.getElementById('h-name').value = '';
  document.getElementById('h-time').value = '';
  document.querySelectorAll('.icon-opt').forEach(e => e.classList.remove('selected'));
  document.querySelector('.icon-opt')?.classList.add('selected');
  document.getElementById('habit-modal').classList.add('open');
}
function openEdit(id, name, icon, time) {
  editingHabitId = id;
  document.getElementById('modal-title').textContent = 'Odatni tahrirlash';
  document.getElementById('h-name').value = name;
  document.getElementById('h-time').value = time === 'vaqtsiz' ? '' : time;
  document.querySelectorAll('.icon-opt').forEach(e => {
    e.classList.toggle('selected', e.dataset.icon === icon);
  });
  document.getElementById('habit-modal').classList.add('open');
}
function closeModal() { document.getElementById('habit-modal').classList.remove('open'); }

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.className = 'toast show' + (err?' err':'');
  setTimeout(() => t.className = 'toast', 2500);
}

async function saveHabit() {
  const name = document.getElementById('h-name').value.trim();
  const time = document.getElementById('h-time').value.trim() || 'vaqtsiz';
  const icon = document.querySelector('.icon-opt.selected')?.dataset.icon || '✅';
  if (!name) { showToast('Nom kiriting!', true); return; }
  try {
    if (editingHabitId) {
      await fetch(`${API}/habits/${userId}/${editingHabitId}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-User-Id':userId},
        body: JSON.stringify({name, icon, time})
      });
      showToast('✅ Saqlandi!');
    } else {
      await fetch(`${API}/habits/${userId}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-User-Id':userId},
        body: JSON.stringify({name, icon, time})
      });
      showToast('✅ Qo\'shildi!');
    }
    closeModal();
    loaded.habits = false;
    await loadHabits();
  } catch(e) { showToast('Xato yuz berdi!', true); }
}

async function deleteHabit(id) {
  if (!confirm('Odatni o\'chirasizmi?')) return;
  try {
    await fetch(`${API}/habits/${userId}/${id}`, {
      method: 'DELETE', headers: {'X-User-Id': userId}
    });
    showToast('🗑️ O\'chirildi!');
    loaded.habits = false;
    await loadHabits();
  } catch(e) { showToast('Xato!', true); }
}

async function loadGroups() {
  try {
    const d = await apiFetch(`groups/${userId}`);
    renderGroups(d);
  } catch(e) {
    document.getElementById('groups-content').innerHTML =

}

function renderGroups(d) {
  if (!d.groups || d.groups.length === 0) {
    document.getElementById('groups-content').innerHTML =
      `<div class="empty-state"><div class="icon">👥</div>Siz hech qanday guruhga a'zo emassiz</div>`;
    return;
  }
  let html = '';
  d.groups.forEach(g => {
    let membersHtml = (g.members || []).slice(0,5).map((m,i) =>
      `<div class="member-row">
        <div class="member-name">${['🥇','🥈','🥉'][i]||'•'} ${m.name}</div>
        <div class="member-pts">${m.points} ball</div>
       </div>`
    ).join('');
    html += `
      <div class="group-card">
        <div class="group-name">👥 ${g.name}</div>
        <div class="group-meta">${g.member_count} a'zo</div>
        <div class="group-members">${membersHtml}</div>
      </div>`;
  });
  document.getElementById('groups-content').innerHTML =
    `<div class="section-title">Mening guruhlarim</div>${html}`;
}

loadToday();
